{% extends "base.html" %}

{% block title %}Judge Panel{% endblock %}

{% block content %}
<div class="glass-card p-5 animate" style="max-width: 600px; margin: 0 auto;">
    <div class="text-center mb-4">
        <i class="fas fa-gavel" style="font-size: 3rem; color: #ffd700;"></i>
        <h2 style="color: #fff; margin-top: 15px;">Judge Panel</h2>
        <p style="color: rgba(255,255,255,0.7);">Assign scores to participants (0-100)</p>
    </div>

    {% if participants %}
    <form method="POST" action="/judge">
        <div class="mb-4">
            <label><i class="fas fa-users"></i> Select Participant</label>
            <select name="participant" class="form-select" required>
                <option value="" disabled selected>-- Select a participant --</option>
                {% for p in participants %}
                <option value="{{ p.id }}">{{ p.name }} - {{ p.topic }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-4">
            <label><i class="fas fa-star"></i> Score (0-100)</label>
            <input type="number" name="score" class="form-control" min="0" max="100" placeholder="Enter score" required>
        </div>

        <div class="mb-4">
            <label><i class="fas fa-user-tie"></i> Judge Name</label>
            <input type="text" name="judge_name" class="form-control" placeholder="Your name (optional)">
        </div>

        <button type="submit" class="btn btn-custom btn-success-custom w-100">
            <i class="fas fa-check-circle"></i> Submit Score
        </button>
    </form>
    {% else %}
    <div class="text-center">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ffd700;"></i>
        <p style="color: white; margin-top: 15px;">No participants registered yet.</p>
        <a href="/register" class="btn btn-custom btn-primary-custom">
            <i class="fas fa-user-plus"></i> Register First Participant
        </a>
    </div>
    {% endif %}

    <div class="text-center mt-4">
        <a href="/" class="btn btn-custom" style="background: rgba(255,255,255,0.2); color: white;">
            <i class="fas fa-home"></i> Back to Home
        </a>
        <a href="/results" class="btn btn-custom" style="background: rgba(255,255,255,0.2); color: white;">
            <i class="fas fa-chart-line"></i> View Results
        </a>
    </div>
</div>
{% endblock %}
